<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE — Noisy Beast</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --white: #ffffff;
    --blue: #0066FF;
    --blue-light: #3385ff;
    --mid: #1a1a1a;
    --text-muted: #888;
    --border: rgba(0,102,255,0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: "Barlow", sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--black); z-index: 100; }
  .logo { display: flex; align-items: center; gap: 16px; }
  .logo-core { font-family: "Anton", sans-serif; font-size: 28px; font-weight: 700; color: var(--blue); letter-spacing: 0.08em; }
  .logo-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .header-badge { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; }
  main { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; padding: 60px 40px 40px; }
  .hero { margin-bottom: 48px; animation: fadeUp 0.6s ease both; }
  .hero h1 { font-family: "Anton", sans-serif; font-size: 42px; font-weight: 400; line-height: 1.2; margin-bottom: 12px; color: var(--white); }
  .hero h1 span { color: var(--blue); }
  .hero p { color: var(--text-muted); font-size: 15px; line-height: 1.6; max-width: 560px; }
  .api-setup { background: var(--mid); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 32px; animation: fadeUp 0.6s ease both; }
  .api-setup h3 { font-family: "Anton", sans-serif; font-size: 18px; margin-bottom: 8px; color: var(--blue); }
  .api-setup p { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
  .api-input-row { display: flex; gap: 10px; }
  .api-key-input { flex: 1; background: var(--black); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: monospace; font-size: 13px; padding: 10px 16px; outline: none; }
  .api-key-input:focus { border-color: var(--blue); }
  .api-save-btn { background: var(--blue); color: var(--black); border: none; font-family: "Barlow", sans-serif; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
  .api-save-btn:hover { background: var(--blue-light); }
  .api-status { font-size: 12px; margin-top: 8px; color: var(--text-muted); }
  .api-status.ok { color: #7dba7d; }
  .api-status.err { color: #f08080; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; animation: fadeUp 0.6s 0.1s ease both; }
  .suggestion-pill { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: "Barlow", sans-serif; font-size: 12px; padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .suggestion-pill:hover { border-color: var(--blue); color: var(--blue); background: rgba(0,102,255,0.08); }
  .input-section { animation: fadeUp 0.6s 0.15s ease both; }
  .input-wrapper { position: relative; background: var(--mid); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .input-wrapper:focus-within { border-color: var(--blue); }
  textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--white); font-family: "Barlow", sans-serif; font-size: 15px; font-weight: 300; padding: 20px 24px 60px; resize: none; min-height: 130px; line-height: 1.6; }
  textarea::placeholder { color: #555; }
  .input-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
  .char-count { font-size: 12px; color: #555; }
  .send-btn { background: var(--blue); color: var(--black); border: none; font-family: "Barlow", sans-serif; font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .send-btn:hover { background: var(--blue-light); transform: translateY(-1px); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .response-section { margin-top: 40px; animation: fadeUp 0.4s ease both; }
  .response-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .response-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--blue); }
  .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: "Barlow", sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { border-color: var(--blue); color: var(--blue); }
  .response-content { color: #d4cfc8; font-size: 15px; line-height: 1.8; white-space: pre-wrap; }
  .response-content strong { color: var(--white); font-weight: 500; }
  .loading { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 14px; padding: 24px 0; }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dots span { width: 5px; height: 5px; background: var(--blue); border-radius: 50%; animation: pulse 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  .error-msg { background: rgba(200,50,50,0.1); border: 1px solid rgba(200,50,50,0.3); color: #f08080; padding: 16px 20px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
  .history-section { margin-top: 48px; border-top: 1px solid var(--border); padding-top: 32px; }
  .history-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
  .history-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; }
  .history-item:hover .history-q { color: var(--blue); }
  .history-q { font-size: 13px; color: var(--white); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; }
  .history-time { font-size: 11px; color: #555; }
  .file-upload-area { margin-bottom: 12px; }
  .file-upload-label { display: inline-flex; align-items: center; gap: 8px; background: transparent; border: 1px dashed var(--border); color: var(--text-muted); font-family: "Barlow", sans-serif; font-size: 12px; padding: 10px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .file-upload-label:hover { border-color: var(--blue); color: var(--blue); }
  .file-upload-label svg { width: 14px; height: 14px; }
  #fileInput { display: none; }
  .file-attached { display: flex; align-items: center; gap: 10px; background: rgba(0,102,255,0.08); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
  .file-attached-name { font-size: 13px; color: var(--blue); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; }
  .file-remove:hover { color: var(--white); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  @media (max-width: 600px) { header { padding: 20px 24px; } main { padding: 40px 24px 32px; } .hero h1 { font-size: 30px; } .api-input-row { flex-direction: column; } }
</style>
</head>

  function b64decode(str) {
    return decodeURIComponent(escape(atob(str)));
  }

  const CASE_STUDIES = JSON.parse(b64decode(CS_B64));
  const CREDS_DATA = JSON.parse(b64decode(CREDS_B64));
  const SYSTEM_PROMPT = b64decode(SYS_B64);

  let apiKey = sessionStorage.getItem("core_api_key") || "";
  let history = [];
  let attachedFile = null; // { name, type, content (text or base64), isBase64 }

  window.addEventListener("DOMContentLoaded", function() {
    renderHistory();
  });

  // ── File handling ─────────────────────────────────────────────────────────
  function handleFileUpload(event) {
    var file = event.target.files[0];
    if (!file) return;

    var name = file.name;
    var ext = name.split(".").pop().toLowerCase();

    if (ext === "pdf") {
      // Send as base64 to Claude's native PDF support
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result.split(",")[1];
        attachedFile = { name: name, type: "pdf", content: base64, isBase64: true };
        showFileAttached(name);
      };
      reader.readAsDataURL(file);
    } else if (ext === "txt") {
      var reader = new FileReader();
      reader.onload = function(e) {
        attachedFile = { name: name, type: "txt", content: e.target.result, isBase64: false };
        showFileAttached(name);
      };
      reader.readAsText(file);
    } else if (ext === "doc" || ext === "docx") {
      // Extract text from docx using FileReader - read as array buffer then extract text
      var reader = new FileReader();
      reader.onload = function(e) {
        // For docx we'll send raw text extracted via a simple XML parse
        extractDocxText(e.target.result, name);
      };
      reader.readAsArrayBuffer(file);
    } else {
      alert("Unsupported file type. Please use PDF, Word (.docx), or TXT.");
    }
  }

  function extractDocxText(arrayBuffer, name) {
    // docx files are zip archives - extract document.xml and strip tags
    try {
      var uint8 = new Uint8Array(arrayBuffer);
      var binary = "";
      for (var i = 0; i < uint8.length; i++) {
        binary += String.fromCharCode(uint8[i]);
      }
      var b64 = btoa(binary);
      // We'll send as base64 and tell Claude it's a docx - Claude can handle the XML
      attachedFile = { name: name, type: "docx", content: b64, isBase64: true, rawBinary: true };
      showFileAttached(name);
    } catch(e) {
      alert("Could not read Word document. Try saving as .txt or PDF instead.");
    }
  }

  function showFileAttached(name) {
    document.getElementById("fileAttachedName").textContent = name;
    document.getElementById("fileAttached").style.display = "flex";
    document.getElementById("fileUploadLabel").style.display = "none";
  }

  function removeFile() {
    attachedFile = null;
    document.getElementById("fileAttached").style.display = "none";
    document.getElementById("fileUploadLabel").style.display = "inline-flex";
    document.getElementById("fileInput").value = "";
  }

  function saveApiKey() {
    var val = document.getElementById("apiKeyInput").value.trim();
    if (!val || val.length < 20) {
      setStatus("Please paste your full API key", "err");
      return;
    }
    apiKey = val;
    sessionStorage.setItem("core_api_key", val);
    document.getElementById("apiSetup").style.display = "none";
    setStatus("", "");
  }

  function setStatus(msg, type) {
    var el = document.getElementById("apiStatus");
    el.textContent = msg;
    el.className = "api-status " + type;
  }

  function setPrompt(btn) {
    document.getElementById("queryInput").value = btn.textContent;
    updateCharCount();
    document.getElementById("queryInput").focus();
  }

  function updateCharCount() {
    var len = document.getElementById("queryInput").value.length;
    document.getElementById("charCount").textContent = len + " character" + (len !== 1 ? "s" : "");
  }

  function handleKeydown(e) {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      sendQuery();
    }
  }

  function buildContext() {
    var ctx = "=== CASE STUDIES ===\n";
    CASE_STUDIES.forEach(function(cs) {
      ctx += "Client: " + (cs.Client || cs.Title || "") + "\n";
      ctx += "Sector: " + (cs.Sector || "") + "\n";
      ctx += "Challenge: " + (cs.Challenge || "") + "\n";
      ctx += "Solution: " + (cs.Solution || "") + "\n";
      ctx += "Results: " + (cs.Results || "") + "\n";
      ctx += "Summary: " + (cs.Summary || "") + "\n\n";
    });
    ctx += "\n=== CREDENTIALS AND FRAMEWORKS ===\n";
    Object.keys(CREDS_DATA).forEach(function(sheet) {
      ctx += "\n--- " + sheet + " ---\n";
      CREDS_DATA[sheet].forEach(function(row) {
        if (row.Headline) {
          ctx += "\nCapability: " + row.Headline + "\n";
          if (row.Blurb) ctx += "Description: " + row.Blurb + "\n";
          if (row.tags) ctx += "Tags: " + row.tags + "\n";
          if (row.detailed_rfp_explanation) ctx += "Detail: " + row.detailed_rfp_explanation + "\n";
          if (row.use_cases) ctx += "Use cases: " + row.use_cases + "\n";
        }
      });
    });
    return ctx;
  }

  async function sendQuery() {
    var query = document.getElementById("queryInput").value.trim();
    if (!query) return;

    var btn = document.getElementById("sendBtn");
    btn.disabled = true;
    btn.textContent = "Thinking...";

    var responseSection = document.getElementById("responseSection");
    var responseContent = document.getElementById("responseContent");
    responseSection.style.display = "block";
    responseContent.innerHTML = "<div class='loading'><div class='loading-dots'><span></span><span></span><span></span></div><span>CORE is thinking...</span></div>";

    var context = buildContext();
    var userMessageContent = [];

    // Add the knowledge base + query as text
    var textContent = "Here is the Noisy Beast knowledge base:\n\n" + context + "\n\n---\n\n";

    // Add attached document if present
    if (attachedFile) {
      if (attachedFile.type === "pdf") {
        // Add PDF as document block (Claude native PDF support)
        textContent += "The user has also attached a document called '" + attachedFile.name + "'. Please read it carefully as context for the query below.\n\n";
        userMessageContent.push({
          type: "document",
          source: {
            type: "base64",
            media_type: "application/pdf",
            data: attachedFile.content
          }
        });
      } else if (attachedFile.type === "txt") {
        textContent += "The user has attached a document called '" + attachedFile.name + "':\n\n" + attachedFile.content + "\n\n---\n\n";
      } else if (attachedFile.type === "docx") {
        textContent += "The user has attached a Word document called '" + attachedFile.name + "'. Note: this is a binary file - do your best to extract the readable text content from it.\n\n";
        userMessageContent.push({
          type: "document",
          source: {
            type: "base64",
            media_type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            data: attachedFile.content
          }
        });
      }
    }

    textContent += "User query: " + query;
    userMessageContent.push({ type: "text", text: textContent });

    try {
      var response = await (fetch("/api/claude", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-5-20250929",
          max_tokens: 2000,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: userMessageContent }]
        })
      });

      if (!response.ok) {
        var err = await response.json();
        throw new Error(err.error ? err.error.message : "API error " + response.status);
      }

      var data = await response.json();
      var text = data.content[0].text;

      var formatted = text
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .split("\n").join("<br>");

      responseContent.innerHTML = formatted;

      history.unshift({ query: query, response: text, time: new Date() });
      if (history.length > 10) history.pop();
      renderHistory();

    } catch(err) {
      responseContent.innerHTML = "<div class='error-msg'><strong>Something went wrong</strong><br>" + err.message + "<br><br>Check your API key is correct and you have credits in your Anthropic account.</div>";
    }

    btn.disabled = false;
    btn.textContent = "Ask CORE";
  }

  function copyResponse() {
    var text = document.getElementById("responseContent").innerText;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById("copyBtn");
      btn.textContent = "Copied!";
      setTimeout(function() { btn.textContent = "Copy"; }, 2000);
    });
  }

  function renderHistory() {
    if (history.length === 0) {
      document.getElementById("historySection").style.display = "none";
      return;
    }
    document.getElementById("historySection").style.display = "block";
    var list = document.getElementById("historyList");
    list.innerHTML = history.map(function(item, i) {
      return "<div class='history-item' onclick='loadHistory(" + i + ")'><div class='history-q'>" + item.query + "</div><div class='history-time'>" + item.time.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) + "</div></div>";
    }).join("");
  }

  function loadHistory(i) {
    var item = history[i];
    document.getElementById("queryInput").value = item.query;
    updateCharCount();
    var formatted = item.response.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").split("\n").join("<br>");
    document.getElementById("responseContent").innerHTML = formatted;
    document.getElementById("responseSection").style.display = "block";
  }
</script>
